<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HabitFlow</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f2f5;
      --panel: #ffffff;
      --text: #1c1b1f;
      --muted: #716872;
      --accent: #d94f8a;
      --accent-strong: #b93770;
      --ok: #15965f;
      --line: #eadde5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 18px 14px 28px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .date {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }
    .score {
      min-width: 88px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 10px 12px;
      text-align: center;
    }
    .score b {
      display: block;
      color: var(--accent-strong);
      font-size: 24px;
    }
    .score span {
      color: var(--muted);
      font-size: 12px;
    }
    form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    input {
      flex: 1;
      min-width: 0;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 0 12px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }
    button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      padding: 0 12px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }
    button.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }
    button.done { background: var(--ok); }
    .list {
      display: grid;
      gap: 10px;
    }
    .habit {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .habit-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .habit-name {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .status {
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .empty,
    .error {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171316;
        --panel: #211b20;
        --text: #f3eef2;
        --muted: #b9acb6;
        --line: #382d35;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>HabitFlow</h1>
        <div class="date" id="today">Сегодня</div>
      </div>
      <div class="score">
        <b id="score">0/0</b>
        <span>готово</span>
      </div>
    </header>

    <form id="add-form">
      <input id="habit-name" maxlength="80" placeholder="Новая привычка" autocomplete="off">
      <button type="submit">Добавить</button>
    </form>

    <section class="list" id="list">
      <div class="empty">Загрузка...</div>
    </section>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();

    const initData = tg?.initData || "";
    const list = document.querySelector("#list");
    const score = document.querySelector("#score");
    const today = document.querySelector("#today");
    const form = document.querySelector("#add-form");
    const input = document.querySelector("#habit-name");

    async function request(path, options = {}) {
      const method = options.method || "POST";
      const payload = options.body ? JSON.parse(options.body) : {};
      const response = await fetch(path, {
        ...options,
        method,
        headers: {
          "Content-Type": "application/json",
          "X-Telegram-Init-Data": initData,
          ...(options.headers || {}),
        },
        body: JSON.stringify({ _auth: initData, ...payload }),
      });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    }

    function statusText(habit) {
      if (habit.done_today) return "выполнено";
      if (habit.missed_today) return "не сегодня";
      return "ждёт отметки";
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render(data) {
      today.textContent = data.today;
      score.textContent = `${data.summary.done}/${data.summary.total}`;
      if (!data.habits.length) {
        list.innerHTML = '<div class="empty">Пока нет привычек.</div>';
        return;
      }
      list.innerHTML = data.habits.map((habit) => `
        <article class="habit">
          <div class="habit-top">
            <div>
              <h2 class="habit-name">${escapeHtml(habit.name)}</h2>
              <div class="meta">серия: ${habit.streak} · всего: ${habit.total_completed}</div>
            </div>
            <div class="status">${statusText(habit)}</div>
          </div>
          <div class="actions">
            ${habit.done_today
              ? `<button class="secondary" data-action="undo" data-id="${habit.id}">Отменить</button>`
              : `<button class="done" data-action="mark" data-id="${habit.id}">Выполнил</button>`}
            <button class="secondary" data-action="miss" data-id="${habit.id}">Не сегодня</button>
          </div>
        </article>
      `).join("");
    }

    async function load() {
      try {
        render(await request("/api/state"));
      } catch (error) {
        const details = initData ? "Не удалось проверить вход Telegram." : "Telegram не передал данные входа.";
        list.innerHTML = `<div class="error">${details}</div>`;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const name = input.value.trim();
      if (!name) return;
      input.value = "";
      render(await request("/api/habits", {
        method: "POST",
        body: JSON.stringify({ name }),
      }));
    });

    list.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const { action, id } = button.dataset;
      button.disabled = true;
      render(await request(`/api/habits/${id}/${action}`, { method: "POST" }));
    });

    load();
  </script>
</body>
</html>
